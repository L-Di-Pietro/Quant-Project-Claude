<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Backtester Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .data-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            background: #f9f9f9;
        }

        .data-item {
            padding: 10px;
            background: white;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 4px solid #667eea;
            font-size: 13px;
        }

        .data-item .symbol {
            font-weight: 600;
            color: #667eea;
        }

        .data-item .dates {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .metric-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .metric-box .value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .metric-box .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
        }

        .hidden {
            display: none;
        }

        .trades-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }

        .trades-table th {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .trades-table td {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .trades-table tr:hover {
            background: #f5f5f5;
        }

        @media (max-width: 1024px) {
            .main-grid,
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Quant Backtester Dashboard</h1>
            <p>Test your trading strategies in real-time</p>
        </header>

        <div class="main-grid">
            <!-- Configuration Panel -->
            <div class="card">
                <h2>⚙️ Configuration</h2>

                <div class="form-group">
                    <label for="symbol">Security Symbol</label>
                    <input type="text" id="symbol" placeholder="e.g., AAPL, MSFT, GOOG" value="AAPL">
                </div>

                <div class="form-group">
                    <label for="strategy">Strategy</label>
                    <select id="strategy">
                        <option value="">-- Select Strategy --</option>
                    </select>
                </div>

                <div id="strategyParams"></div>

                <div class="form-group">
                    <label for="startDate">Start Date</label>
                    <input type="date" id="startDate" value="2020-01-01">
                </div>

                <div class="form-group">
                    <label for="endDate">End Date</label>
                    <input type="date" id="endDate" value="2024-12-31">
                </div>

                <div class="form-group">
                    <label for="initialCapital">Initial Capital ($)</label>
                    <input type="number" id="initialCapital" value="100000" min="1000">
                </div>

                <div class="form-group">
                    <label for="orderQuantity">Order Quantity (shares)</label>
                    <input type="number" id="orderQuantity" value="100" min="1">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="runBacktest()">🚀 Run Backtest</button>
                    <button class="btn-secondary" onclick="downloadData()">📥 Download Data</button>
                </div>

                <div id="message" class="hidden" style="margin-top: 15px;"></div>
            </div>

            <!-- Data Panel -->
            <div class="card">
                <h2>📊 Available Data</h2>
                <button class="btn-secondary" onclick="loadAvailableData()" style="width: 100%; margin-bottom: 15px;">🔄 Refresh Data List</button>
                <div id="dataList" class="data-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading available data...
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden">
            <div class="card full-width">
                <h2>📈 Performance Metrics</h2>
                <div class="results-grid">
                    <div id="metricsContainer"></div>
                </div>
            </div>

            <div class="card full-width">
                <h2>📊 Equity Curve</h2>
                <canvas id="equityChart" height="60"></canvas>
            </div>

            <div class="card full-width">
                <h2>🎯 Trade Log</h2>
                <div style="overflow-x: auto;">
                    <table id="tradeLog" class="trades-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Commission</th>
                                <th>Cost</th>
                            </tr>
                        </thead>
                        <tbody id="tradeBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let equityChart = null;

        // Load strategies on page load
        window.addEventListener('load', function() {
            loadStrategies();
            loadAvailableData();
        });

        async function loadStrategies() {
            try {
                const response = await axios.get('/api/strategies');
                const strategies = response.data;
                const select = document.getElementById('strategy');
                
                for (const [key, strategy] of Object.entries(strategies)) {
                    const option = document.createElement('option');
                    option.value = key;
                    option.textContent = strategy.name;
                    select.appendChild(option);
                }

                select.addEventListener('change', updateStrategyParams);
                updateStrategyParams();
            } catch (error) {
                showMessage('Error loading strategies: ' + error.message, 'error');
            }
        }

        async function updateStrategyParams() {
            const strategyKey = document.getElementById('strategy').value;
            const container = document.getElementById('strategyParams');
            container.innerHTML = '';

            if (!strategyKey) return;

            try {
                const response = await axios.get('/api/strategies');
                const strategies = response.data;
                const params = strategies[strategyKey].params;

                for (const [paramKey, paramInfo] of Object.entries(params)) {
                    const group = document.createElement('div');
                    group.className = 'form-group';
                    
                    const label = document.createElement('label');
                    label.textContent = paramKey.replace(/_/g, ' ').toUpperCase();
                    
                    const input = document.createElement('input');
                    input.type = paramInfo.type === 'float' ? 'number' : 'number';
                    input.id = 'param_' + paramKey;
                    input.value = paramInfo.default;
                    input.step = paramInfo.type === 'float' ? '0.1' : '1';
                    input.min = paramInfo.min;
                    input.max = paramInfo.max;
                    
                    group.appendChild(label);
                    group.appendChild(input);
                    container.appendChild(group);
                }
            } catch (error) {
                showMessage('Error loading strategy parameters: ' + error.message, 'error');
            }
        }

        async function loadAvailableData() {
            try {
                const response = await axios.get('/api/data');
                const dataList = document.getElementById('dataList');
                
                if (response.data.files.length === 0) {
                    dataList.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">No data files found. Download some data to get started!</div>';
                } else {
                    let html = '';
                    response.data.files.forEach(file => {
                        if (!file.error) {
                            html += `
                                <div class="data-item">
                                    <div class="symbol">${file.symbol}</div>
                                    <div class="dates">${file.start_date} to ${file.end_date}</div>
                                    <div class="dates">${file.rows.toLocaleString()} bars</div>
                                </div>
                            `;
                        }
                    });
                    dataList.innerHTML = html;
                }
            } catch (error) {
                document.getElementById('dataList').innerHTML = '<div class="error">Error loading data: ' + error.message + '</div>';
            }
        }

        async function downloadData() {
            const symbols = [document.getElementById('symbol').value.toUpperCase()];
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!symbols[0]) {
                showMessage('Please enter a symbol', 'error');
                return;
            }

            showMessage('⏳ Downloading data... This may take a minute...', 'loading');

            try {
                const response = await axios.post('/api/download-data', {
                    symbols: symbols,
                    start: startDate,
                    end: endDate
                });

                showMessage('✅ Data downloaded successfully!', 'success');
                setTimeout(() => {
                    loadAvailableData();
                }, 1000);
            } catch (error) {
                showMessage('Error downloading data: ' + error.response?.data?.error || error.message, 'error');
            }
        }

        async function runBacktest() {
            const symbol = document.getElementById('symbol').value.toUpperCase();
            const strategy = document.getElementById('strategy').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const initialCapital = parseFloat(document.getElementById('initialCapital').value);
            const orderQuantity = parseInt(document.getElementById('orderQuantity').value);

            if (!symbol || !strategy) {
                showMessage('Please select a symbol and strategy', 'error');
                return;
            }

            showMessage('⏳ Running backtest... This may take a moment...', 'loading');

            try {
                const strategyParams = {};
                const paramInputs = document.querySelectorAll('[id^="param_"]');
                paramInputs.forEach(input => {
                    const key = input.id.replace('param_', '');
                    strategyParams[key] = input.value;
                });

                const response = await axios.post('/api/backtest', {
                    symbol: symbol,
                    strategy: strategy,
                    start_date: startDate,
                    end_date: endDate,
                    initial_capital: initialCapital,
                    order_quantity: orderQuantity,
                    strategy_params: strategyParams
                });

                displayResults(response.data);
                showMessage('✅ Backtest completed successfully!', 'success');
            } catch (error) {
                showMessage('Error running backtest: ' + error.response?.data?.error || error.message, 'error');
            }
        }

        function displayResults(data) {
            document.getElementById('resultsSection').classList.remove('hidden');

            // Display metrics
            const metrics = data.performance;
            let metricsHTML = '';
            
            const metricKeys = {
                'Total Return': 'total_return',
                'Sharpe Ratio': 'sharpe_ratio',
                'Max Drawdown': 'max_drawdown',
                'Win Rate': 'win_rate',
                'Profit Factor': 'profit_factor',
                'Number of Trades': 'num_trades'
            };

            for (const [label, key] of Object.entries(metricKeys)) {
                if (key in metrics) {
                    let value = metrics[key];
                    if (typeof value === 'number') {
                        if (key.includes('return') || key.includes('drawdown')) {
                            value = (value * 100).toFixed(2) + '%';
                        } else if (key.includes('ratio') || key.includes('factor')) {
                            value = value.toFixed(2);
                        } else {
                            value = value.toFixed(2);
                        }
                    }
                    metricsHTML += `
                        <div class="metric-box">
                            <div class="label">${label}</div>
                            <div class="value">${value}</div>
                        </div>
                    `;
                }
            }
            document.getElementById('metricsContainer').innerHTML = metricsHTML;

            // Plot equity curve
            const equityCurve = data.equity_curve;
            const dates = Object.keys(equityCurve).sort();
            const values = dates.map(date => equityCurve[date].Equity);

            const ctx = document.getElementById('equityChart').getContext('2d');
            
            if (equityChart) {
                equityChart.destroy();
            }

            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Portfolio Equity',
                        data: values,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0,
                        pointHoverRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: '#333',
                                font: { size: 12 }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                color: '#666',
                                callback: function(value) {
                                    return '$' + value.toLocaleString(undefined, {maximumFractionDigits: 0});
                                }
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.1)'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#666',
                                maxTicksLimit: 20
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });

            // Display trade log
            const tradeBody = document.getElementById('tradeBody');
            tradeBody.innerHTML = '';

            if (data.trade_log && data.trade_log.length > 0) {
                data.trade_log.forEach(trade => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${trade.Datetime || 'N/A'}</td>
                        <td>${trade.Type || 'N/A'}</td>
                        <td>${trade.Quantity || 0}</td>
                        <td>$${parseFloat(trade.Price || 0).toFixed(2)}</td>
                        <td>$${parseFloat(trade.Commission || 0).toFixed(2)}</td>
                        <td>$${parseFloat(trade.Cost || 0).toFixed(2)}</td>
                    `;
                    tradeBody.appendChild(row);
                });
            } else {
                tradeBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No trades executed</td></tr>';
            }

            // Scroll to results
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = type;
            messageDiv.classList.remove('hidden');

            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    messageDiv.classList.add('hidden');
                }, 5000);
            }
        }
    </script>
</body>
</html>
